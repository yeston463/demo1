spring:
  application:
    name: lc4j-1
  data:
    redis:
      host: localhost
      port: 6379

langchain4j:
  open-ai:
    chat-model:
      api-key: ${QWEN-APIKEY}
      model-name: qwen-max
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${QWEN-APIKEY}
      model-name: qwen-max
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      log-requests: true
      log-responses: true
server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
logging:
  level:
    dev.langchain4j: debug
    dev.ai4j.openai4j: debug
